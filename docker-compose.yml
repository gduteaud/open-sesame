services:
  postgres:
    image: postgres:16-alpine
    container_name: open-sesame-pg
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: open_sesame
    volumes:
      - open_sesame_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d open_sesame"]
      interval: 3s
      timeout: 5s
      retries: 5

volumes:
  open_sesame_pgdata:
